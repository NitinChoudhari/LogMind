  provider: huggingface
  loader: chat
  identifier: G:\Project\AI\Workspace\HuggingFace\Models\Qwen3-4B-Instruct-2507
  display_name: Qwen3 4B Instruct (local transformers)

# --- Embeddings (role: embedding, loader: embedding) -------------------------
