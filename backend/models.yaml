bge-small-en-v1.5:
  role: embedding
  provider: huggingface
  loader: embedding
  identifier: BAAI/bge-small-en-v1.5

# --- Reranker (role: reranker) ------------------------------------------------
bge-reranker-v2-m3:
  role: reranker
  provider: sentence-transformers
  loader: cross-encoder
  identifier: F:\Models\lmstudio-community\Reranker\bge-reranker-v2-m3

ms-marco-minilm-l6-v2:
